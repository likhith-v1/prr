name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest covers native Linux and the WSL2 code path; macos-latest
        # covers Mac. Tests use fake backends, so no Ollama/GPU is required.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --extra test pytest

      - name: Run lint
        run: uv run ruff check core frontends tests
