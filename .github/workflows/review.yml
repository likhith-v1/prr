name: prr

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

# One shared self-hosted GPU runs the model, so serialize every review for this
# repository onto it; never cancel an in-flight run (a stale PR head is detected
# and skipped at post time instead).
concurrency:
  group: prr-${{ github.repository }}
  cancel-in-progress: false

jobs:
  review:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, gpu]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - uses: astral-sh/setup-uv@v5
      - name: Review PR
        run: uv run --frozen python -m frontends.action_entry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          UV_CACHE_DIR: .uv-cache
